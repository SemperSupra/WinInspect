name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build and Test
        run: |
          cmake -S . -B build -DWININSPECT_BUILD_TESTS=ON
          cmake --build build --config Release
          ctest --test-dir build -C Release --output-on-failure

      - name: Build Portable CLI (Windows)
        shell: bash
        run: |
          mkdir -p dist
          GOOS=windows GOARCH=amd64 go build -C clients/portable -o ../../dist/wi-portable-${{ github.ref_name }}-win-x64.exe

      - name: Build Portable CLI (Linux)
        shell: bash
        run: |
          GOOS=linux GOARCH=amd64 go build -C clients/portable -o ../../dist/wi-portable-${{ github.ref_name }}-linux-x64

      - name: Install Tools (NSIS + 7zip)
        run: choco install nsis 7zip --no-progress -y

      - name: Stage Binaries
        run: |
          mkdir -Force dist\staging
          Get-ChildItem -Path build\* -Recurse -Include wininspectd.exe,wininspect.exe,wininspect-gui.exe -File |
            Copy-Item -Destination dist\staging\ -Verbose

      - name: Package Installer (NSIS)
        shell: bash
        run: |
          export PATH="/c/Program Files (x86)/NSIS:$PATH"
          ls -la dist/staging/
          makensis -DVERSION=${{ github.ref_name }} -DBUILD_SRC=../dist/staging -DDIST_DIR=../dist tools/wininspect.nsi

      - name: Package PortableApps.com
        shell: bash
        run: |
          export PATH="/c/Program Files/7-Zip:$PATH"
          chmod +x scripts/build-portableapps.sh
          scripts/build-portableapps.sh ${{ github.ref_name }} build/Release

      - name: Generate Checksums
        shell: bash
        run: |
          cd dist
          for f in *.exe *.zip *.paf.exe *-linux-x64; do
            if [ -f "$f" ]; then
              sha256sum "$f" > "$f.sha256"
              echo "--- $f ---"
              cat "$f.sha256"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/WinInspect-Installer-*.exe
            dist/WinInspect-Installer-*.exe.sha256
            dist/WinInspectPortable-*.zip
            dist/WinInspectPortable-*.zip.sha256
            dist/WinInspectPortable-*.paf.exe
            dist/WinInspectPortable-*.paf.exe.sha256
            dist/wi-portable-*-win-x64.exe
            dist/wi-portable-*-win-x64.exe.sha256
            dist/wi-portable-*-linux-x64
            dist/wi-portable-*-linux-x64.sha256
          generate_release_notes: true
