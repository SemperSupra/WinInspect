name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Build and Test
        shell: bash
        run: |
          cmake -S . -B build -DWININSPECT_BUILD_TESTS=ON
          cmake --build build --config Release -j$(nproc)
          ls -la build/
          ctest --test-dir build -C Release --output-on-failure

      - name: Build Portable CLI (Windows)
        shell: bash
        run: |
          mkdir -p dist
          GOOS=windows GOARCH=amd64 go build -C clients/portable -o ../../dist/wi-portable-${{ github.ref_name }}-win-x64.exe

      - name: Build Portable CLI (Linux)
        shell: bash
        run: |
          GOOS=linux GOARCH=amd64 go build -C clients/portable -o ../../dist/wi-portable-${{ github.ref_name }}-linux-x64

      - name: Install Tools (NSIS + 7zip)
        run: choco install nsis 7zip --no-progress -y

      - name: Stage Binaries
        shell: bash
        run: |
          mkdir -p dist/staging
          ls -la build/Release/
          cp -v build/Release/wininspectd.exe dist/staging/
          cp -v build/Release/wininspect.exe dist/staging/
          cp -v build/Release/wininspect-gui.exe dist/staging/
          ls -la dist/staging/

      - name: Package Installer (NSIS)
        shell: bash
        run: |
          export PATH="/c/Program Files (x86)/NSIS:$PATH"
          ls -la "${{ github.workspace }}/dist/staging/"
          makensis -DVERSION=${{ github.ref_name }} \
            -DBUILD_SRC="${{ github.workspace }}/dist/staging" \
            -DDIST_DIR="${{ github.workspace }}/dist" \
            tools/wininspect.nsi

      - name: Package PortableApps.com
        shell: bash
        run: |
          export PATH="/c/Program Files/7-Zip:$PATH"
          scripts/build-portableapps.sh ${{ github.ref_name }} build/Release

      - name: Generate Checksums
        shell: bash
        run: |
          cd dist
          for f in *.exe *.zip *.paf.exe *-linux-x64; do
            if [ -f "$f" ]; then
              sha256sum "$f" > "$f.sha256"
              echo "--- $f ---"
              cat "$f.sha256"
            fi
          done

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/WinInspect-Installer-*.exe
            dist/WinInspect-Installer-*.exe.sha256
            dist/WinInspectPortable-*.zip
            dist/WinInspectPortable-*.zip.sha256
            dist/WinInspectPortable-*.paf.exe
            dist/WinInspectPortable-*.paf.exe.sha256
            dist/wi-portable-*-win-x64.exe
            dist/wi-portable-*-win-x64.exe.sha256
            dist/wi-portable-*-linux-x64
            dist/wi-portable-*-linux-x64.sha256
          generate_release_notes: true

      # ── Package Manager Publishing ──────────────────────────────────────────

      - name: Read Installer SHA256
        id: installer_hash
        shell: bash
        run: |
          HASH=$(cat dist/WinInspect-Installer-*.exe.sha256 | awk '{print $1}')
          echo "sha256=$HASH" >> $GITHUB_OUTPUT
          echo "Installer SHA256: $HASH"

      - name: Publish to winget
        shell: bash
        env:
          WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
        run: |
          if [ -z "$WINGET_GITHUB_TOKEN" ]; then
            echo "WINGET_GITHUB_TOKEN not set — skipping winget publish"
            exit 0
          fi
          TAG="${{ github.ref_name }}"
          INSTALLER_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/WinInspect-Installer-${TAG}.exe"
          SHA256="${{ steps.installer_hash.outputs.sha256 }}"

          # wingetcreate updates the manifest and opens a PR
          wingetcreate update SemperSupra.WinInspect \
            --version "${TAG#v}" \
            --urls "$INSTALLER_URL" \
            --sha256 "$SHA256" \
            --submit "$WINGET_GITHUB_TOKEN"

      - name: Publish to Chocolatey
        shell: bash
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          if [ -z "$CHOCO_API_KEY" ]; then
            echo "CHOCO_API_KEY not set — skipping Chocolatey publish"
            exit 0
          fi
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          INSTALLER_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/WinInspect-Installer-${TAG}.exe"
          SHA256="${{ steps.installer_hash.outputs.sha256 }}"

          # Build chocolatey package
          mkdir -p chocolatey/tools

      - name: Publish to Scoop
        shell: bash
        env:
          SCOOP_GITHUB_TOKEN: ${{ secrets.SCOOP_GITHUB_TOKEN }}
        run: |
          if [ -z "$SCOOP_GITHUB_TOKEN" ]; then
            echo "SCOOP_GITHUB_TOKEN not set — skipping Scoop publish"
            exit 0
          fi
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          INSTALLER_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/WinInspect-Installer-${TAG}.exe"
          SHA256="${{ steps.installer_hash.outputs.sha256 }}"

          # Clone the Extras bucket, update manifest, submit PR
          git config --global user.name "wininspect-bot"
          git config --global user.email "bot@wininspect.dev"
          gh repo clone ScoopInstaller/Extras /tmp/scoop-extras -- "$SCOOP_GITHUB_TOKEN"
          cd /tmp/scoop-extras
          git checkout -b wininspect-${VERSION}
          echo "Scoop publishing disabled — use separate workflow"
          # TODO: Add scoop publish step when heredoc YAML issue is resolved
          git commit -m "wininspect: update to ${VERSION}"
          git push origin wininspect-${VERSION}
          gh pr create \
            --repo ScoopInstaller/Extras \
            --head wininspect-bot:wininspect-${VERSION} \
            --base master \
            --title "wininspect: update to ${VERSION}" \
            --body "Auto-generated by release workflow for ${TAG}."
