name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and Test
        run: |
          cmake -S . -B build -DWININSPECT_BUILD_TESTS=ON
          cmake --build build --config Release
          ctest --test-dir build -C Release --output-on-failure

      - name: Build Portable CLI
        run: |
          mkdir -Force dist
          go build -C clients/portable -o ../../dist/wi-portable.exe

      - name: Package Installer
        run: & "C:\Program Files (x86)\NSIS\makensis.exe" -DVERSION=ci -DBUILD_SRC=build\Release -DDIST_DIR=dist tools\wininspect.nsi

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: WinInspect-Installer
          path: dist/WinInspect-Installer.exe
