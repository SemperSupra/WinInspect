name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build and Test (Debug)
        run: |
          cmake -S . -B build-debug -DWININSPECT_BUILD_TESTS=ON
          cmake --build build-debug --config Debug
          ctest --test-dir build-debug -C Debug --output-on-failure

      - name: Build and Test (Release)
        run: |
          cmake -S . -B build -DWININSPECT_BUILD_TESTS=ON
          cmake --build build --config Release
          ctest --test-dir build -C Release --output-on-failure

      - name: Build Portable CLI
        run: |
          mkdir -Force dist
          go build -C clients/portable -o ../../dist/wi-portable.exe

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Stage Binaries
        run: |
          mkdir -Force dist\staging
          Get-ChildItem -Path build\* -Recurse -Include wininspectd.exe,wininspect.exe,wininspect-gui.exe -File |
            Copy-Item -Destination dist\staging\ -Verbose

      - name: Package Installer
        shell: bash
        run: |
          export PATH="/c/Program Files (x86)/NSIS:$PATH"
          ls -la dist/staging/
          makensis -DVERSION=ci -DBUILD_SRC=../dist/staging -DDIST_DIR=../dist tools/wininspect.nsi

      - name: Generate Checksums
        shell: bash
        run: |
          cd dist
          sha256sum WinInspect-Installer-ci.exe > WinInspect-Installer-ci.exe.sha256
          cat WinInspect-Installer-ci.exe.sha256

      - name: Upload Installer
        uses: actions/upload-artifact@v7
        with:
          name: WinInspect-Installer
          path: |
            dist/WinInspect-Installer-ci.exe
            dist/WinInspect-Installer-ci.exe.sha256
