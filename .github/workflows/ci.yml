name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and Test
        run: |
          cmake -S . -B build -DWININSPECT_BUILD_TESTS=ON
          cmake --build build --config Release
          ctest --test-dir build -C Release --output-on-failure

      - name: Build Portable CLI
        run: |
          mkdir -Force dist
          go build -C clients/portable -o ../../dist/wi-portable.exe

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Stage Binaries
        run: |
          mkdir -Force dist\staging
          Get-ChildItem -Path build -Recurse -Filter *.exe |
            Where-Object { $_.Name -match '^(wininspectd|wininspect|wininspect-gui)\.exe$' } |
            Copy-Item -Destination dist\staging\

      - name: Package Installer
        run: |
          $env:PATH = "C:\Program Files (x86)\NSIS;$env:PATH"
          makensis -DVERSION=ci -DBUILD_SRC=dist\staging -DDIST_DIR=dist tools\wininspect.nsi

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: WinInspect-Installer
          path: dist/WinInspect-Installer.exe
