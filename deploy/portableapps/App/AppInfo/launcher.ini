[Launch]
ProgramExecutable=WinInspect\wininspectd.exe
ProgramExecutableWhenParameters=WinInspect\wininspect.exe
WaitForProgram=false
CloseEXE=wininspectd.exe
WorkingDirectory=%PAL:AppDir%\WinInspect

[Environment]
PATH=%PAL:AppDir%\WinInspect

[Activate]
Registry=false

[DirectoriesMove]
; not needed — daemon uses named pipe, not filesystem

[DirectoriesCleanupForce]
; not needed

[RegistryKeys]
; not needed — daemon does not write registry

[RegistryCleanupForce]
; not needed

[FileWrite]
; not needed

[Services]
; not needed
